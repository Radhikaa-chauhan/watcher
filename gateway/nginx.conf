worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ─── Logging ─────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    # ─── Rate Limiting ────────────────────────────────────────────
    # Per-IP rate limit for webhook endpoint (GitHub sends max ~1 req/s per repo)
    limit_req_zone $binary_remote_addr zone=webhook:10m rate=10r/s;
    # Per-IP rate limit for dashboard WebSocket auth
    limit_req_zone $binary_remote_addr zone=ws_auth:10m rate=5r/m;

    # ─── Upstream Services ────────────────────────────────────────
    upstream detection_service {
        server detection-service:3001;
        keepalive 32;
    }

    upstream ws_broadcaster {
        server ws-broadcaster:3003;
        keepalive 32;
    }

    # ─── Main Server ──────────────────────────────────────────────
    server {
        listen 8080;
        server_name _;

        # Security headers
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header Referrer-Policy no-referrer;

        # ── GitHub Webhook Endpoint ────────────────────────────────
        # HMAC verification is handled inside the detection service
        location /webhook/github {
            limit_req zone=webhook burst=20 nodelay;

            # Only accept POST
            if ($request_method != POST) {
                return 405;
            }

            # Must have GitHub signature header
            if ($http_x_hub_signature_256 = "") {
                return 403 '{"error":"missing signature"}';
            }

            proxy_pass http://detection_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;

            # Forward original body for HMAC verification
            proxy_request_buffering on;
            proxy_buffer_size 16k;
            proxy_buffers 4 16k;
        }

        # ── WebSocket Endpoint (Dashboard) ────────────────────────
        location /ws {
            limit_req zone=ws_auth burst=5 nodelay;

            proxy_pass http://ws_broadcaster;
            proxy_http_version 1.1;

            # WebSocket upgrade headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Keep WebSocket connections alive
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── Dashboard (static HTML) ──────────────────────────────
        location /dashboard {
            alias /usr/share/nginx/html/dashboard;
            index index.html;
            try_files $uri $uri/ /dashboard/index.html;
            add_header Cache-Control "no-cache";
        }

        # ── Health Check ──────────────────────────────────────────
        location /health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # ── Block everything else ─────────────────────────────────
        location / {
            return 404 '{"error":"not found"}';
            add_header Content-Type application/json;
        }
    }
}
